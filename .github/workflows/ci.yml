# コミットのたびに構成の整合と法則を自動で確かめる。
# 「整合性や法規のチェックは、コミットのたびに自動で回るCIになります」(docs/writing-architecture.md)
name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run check:examples
